name: Workflow 4 - Nightly

on:
  schedule:
    - cron: '0 2 * * *' # Ejecución a las 2 AM UTC
  workflow_dispatch:

jobs:
  system-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chrome, firefox]
        # Inclusiones específicas de SO/Navegador requeridas en el enunciado
        include:
          - os: windows-latest
            browser: edge
          - os: macos-latest
            browser: safari
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Run E2E System Tests
        run: mvn test -Dtest="es.codeurjc.e2e.TransferE2ETest" -Dbrowser=${{ matrix.browser }} -Dapp.url="https://bankingapp.azurewebsites.net"

  build-nightly:
    needs: system-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Generate timestamp tag
        id: timestamp
        run: echo "tag=nightly-$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        
      - name: Generate Docker image
        run: mvn spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ steps.timestamp.outputs.tag }}
        
      - name: Login to DockerHub
        run: docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
        
      - name: Push nightly image to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ steps.timestamp.outputs.tag }}
