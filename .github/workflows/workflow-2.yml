name: Workflow 2 - Pull Request a Main

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  all-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Run Unit Tests
        run: mvn test -Dtest="es.codeurjc.unit.**.*Test"
        
      - name: Run System / E2E Tests
        # Se lanzan en un step separado. Recuerda poner options.addArguments("--headless") en el Java
        run: mvn test -Dtest="es.codeurjc.e2e.**.*Test"