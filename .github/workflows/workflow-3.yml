name: Workflow 3 - Integracion y Despliegue en Main

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
  workflow_dispatch:

# Permisos obligatorios para usar las credenciales federadas de Azure
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Generate tag from pom.xml
        id: project
        run: echo "tag=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)" >> $GITHUB_OUTPUT
        
      - name: Generate Docker image
        run: mvn spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ steps.project.outputs.tag }}
        
      - name: Start container in background
        run: docker run -d -p 8080:8080 --name banking-container ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ steps.project.outputs.tag }}
        
      - name: Wait for Spring Boot to start
        run: sleep 15
        
      - name: Run SmokeTest on Runner
        run: mvn test -Dtest="es.codeurjc.e2e.SmokeTest" -Dapp.url="http://localhost:8080"
        
      - name: Stop and remove container
        run: docker rm -f banking-container
        
      - name: Login to DockerHub
        run: docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
        
      - name: Push image to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ steps.project.outputs.tag }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Generate tag from pom.xml
        id: project
        run: echo "tag=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)" >> $GITHUB_OUTPUT
        
      - name: Az CLI login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Run az commands to deploy container
        run: |
          az containerapp update \
            --name banking-app-production \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ steps.project.outputs.tag }}
            
      - name: Wait for Azure to pull and start the new image
        run: sleep 30
        
      - name: Run SmokeTest against Azure
        # DEBEMOS DE ACTUALIZAR AQUI LUEGO LA URL CUANDO TENGAMOS EL CONTAINER APP DESPLEGADO.
        # Sustituye la URL cuando tengáis el Container App desplegado
        run: mvn test -Dtest="es.codeurjc.e2e.SmokeTest" -Dapp.url="https://bankingapp.azurewebsites.net/login"
