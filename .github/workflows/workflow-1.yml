name: Workflow 1 - Ramas (Tests Unitarios)

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Run Unit Tests
        # Ejecuta exclusivamente los tests dentro de la carpeta unit
        run: mvn test -Dtest="es.codeurjc.unit.*Test"